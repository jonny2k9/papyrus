<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papyrus - Page Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            overflow-x: hidden;
        }

        .page-builder {
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        .sidebar h2 {
            margin-bottom: 20px;
            font-size: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #34495e;
        }

        .component-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .component-btn {
            padding: 12px 16px;
            background-color: #3498db;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
            text-align: left;
        }

        .component-btn:hover {
            background-color: #2980b9;
        }

        .component-btn:active {
            transform: scale(0.98);
        }

        /* Canvas Styles */
        .canvas {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .canvas-content {
            width: 1200px;
            background-color: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding: 40px;
        }

        /* Component Styles */
        .component {
            position: relative;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid transparent;
            border-radius: 4px;
            transition: border-color 0.2s;
        }

        .component:hover {
            border-color: #3498db;
        }

        .component:hover .component-actions {
            display: flex;
        }

        .component-actions {
            display: none;
            position: absolute;
            top: 5px;
            right: 5px;
            gap: 5px;
        }

        .action-btn {
            padding: 5px 10px;
            background-color: #e74c3c;
            border: none;
            border-radius: 3px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .action-btn:hover {
            background-color: #c0392b;
        }

        /* Header Styles */
        .component-header h1 {
            font-size: 36px;
            color: #2c3e50;
            margin: 0;
        }

        .component-header h2 {
            font-size: 28px;
            color: #34495e;
            margin: 0;
        }

        .component-header h3 {
            font-size: 24px;
            color: #34495e;
            margin: 0;
        }

        /* Paragraph Styles */
        .component-paragraph p {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
        }

        /* Editable content */
        [contenteditable="true"] {
            outline: none;
            cursor: text;
        }

        [contenteditable="true"]:focus {
            background-color: #f9f9f9;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #95a5a6;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="page-builder">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>Components</h2>
            <div class="component-list">
                <button class="component-btn" onclick="addComponent('h1')">
                    📝 Header 1
                </button>
                <button class="component-btn" onclick="addComponent('h2')">
                    📝 Header 2
                </button>
                <button class="component-btn" onclick="addComponent('h3')">
                    📝 Header 3
                </button>
                <button class="component-btn" onclick="addComponent('p')">
                    📄 Paragraph
                </button>
            </div>
        </div>

        <!-- Canvas -->
        <div class="canvas">
            <div class="canvas-content" id="canvas">
                <div class="empty-state">
                    <h3>Start Building Your Page</h3>
                    <p>Click on a component from the sidebar to add it to your page</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let componentCounter = 0;

        function addComponent(type) {
            const canvas = document.getElementById('canvas');
            
            // Remove empty state if it exists
            const emptyState = canvas.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            // Create component wrapper
            const component = document.createElement('div');
            component.className = 'component';
            component.id = `component-${componentCounter++}`;

            // Create actions
            const actions = document.createElement('div');
            actions.className = 'component-actions';
            actions.innerHTML = `
                <button class="action-btn" onclick="deleteComponent('${component.id}')">Delete</button>
            `;

            // Create content based on type
            let content;
            switch(type) {
                case 'h1':
                    content = document.createElement('div');
                    content.className = 'component-header';
                    content.innerHTML = '<h1 contenteditable="true">Header 1 - Click to edit</h1>';
                    break;
                case 'h2':
                    content = document.createElement('div');
                    content.className = 'component-header';
                    content.innerHTML = '<h2 contenteditable="true">Header 2 - Click to edit</h2>';
                    break;
                case 'h3':
                    content = document.createElement('div');
                    content.className = 'component-header';
                    content.innerHTML = '<h3 contenteditable="true">Header 3 - Click to edit</h3>';
                    break;
                case 'p':
                    content = document.createElement('div');
                    content.className = 'component-paragraph';
                    content.innerHTML = '<p contenteditable="true">This is a paragraph. Click to edit the text. You can write multiple lines and format your content as needed.</p>';
                    break;
            }

            component.appendChild(actions);
            component.appendChild(content);
            canvas.appendChild(component);
        }

        function deleteComponent(componentId) {
            const component = document.getElementById(componentId);
            if (component) {
                component.remove();

                // Show empty state if no components left
                const canvas = document.getElementById('canvas');
                if (canvas.children.length === 0) {
                    const emptyState = document.createElement('div');
                    emptyState.className = 'empty-state';
                    emptyState.innerHTML = `
                        <h3>Start Building Your Page</h3>
                        <p>Click on a component from the sidebar to add it to your page</p>
                    `;
                    canvas.appendChild(emptyState);
                }
            }
        }
    </script>
</body>
</html>
